name: PR Check

on:
  pull_request:
    branches: [master]

jobs:
  auto-label:
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      pull-requests: write
      issues: write
    steps:
      - name: Add patch label if no version label
        uses: actions/github-script@v8
        with:
          script: |
            const labels = context.payload.pull_request.labels.map(l => l.name);
            if (!labels.includes('major') && !labels.includes('minor') && !labels.includes('patch')) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels: ['patch'],
              });
            }

  conflict-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for merge conflicts
        id: conflict
        run: |
          git fetch origin master
          if ! git merge-tree $(git merge-base HEAD origin/master) HEAD origin/master | grep -q "^<<<<<<<"; then
            echo "clean=true" >> $GITHUB_OUTPUT
          else
            echo "clean=false" >> $GITHUB_OUTPUT
          fi

      - name: Comment on conflict
        if: steps.conflict.outputs.clean == 'false'
        uses: actions/github-script@v8
        with:
          script: |
            const body = '⚠️ This PR has merge conflicts with `master`. Please rebase or merge master into your branch.';
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body === body);
            if (!existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body,
              });
            }
